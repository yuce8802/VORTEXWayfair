<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | Archive 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #f9f9f9;
            --accent: #000000;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: none; /* 隐藏原生光标以使用自定义光标 */
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* 自定义光标 */
        #custom-cursor {
            width: 16px; height: 16px; background: black;
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s, transform 0.1s;
        }

        /* 艺术背景纹理 */
        .canvas-texture {
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* 开屏动画 */
        #loader {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; items-center; justify-content: center;
            transition: opacity 1s ease-out;
        }

        .loader-bar {
            width: 120px; height: 1px; background: rgba(0,0,0,0.1);
            margin-top: 20px; position: relative; overflow: hidden;
        }
        .loader-progress {
            position: absolute; width: 50%; height: 100%;
            background: black; animation: loading 2s infinite ease-in-out;
        }
        @keyframes loading {
            0% { left: -50%; } 100% { left: 100%; }
        }

        /* 过滤按钮样式 */
        .filter-btn {
            padding: 8px 24px; border-radius: 99px; border: 1px solid rgba(0,0,0,0.05);
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.2em; transition: all 0.4s; background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }
        .filter-btn.active { background: black; color: white; border-color: black; transform: scale(1.05); }

        /* 商品卡片动画 */
        .product-card { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .img-container { 
            aspect-ratio: 1/1; background: white; border: 1px solid rgba(0,0,0,0.03);
            display: flex; items-center; justify-content: center; overflow: hidden;
        }
        .img-container img { width: 70%; height: 70%; object-fit: contain; transition: transform 0.8s; }
        .product-card:hover .img-container img { transform: scale(1.1) translateY(-10px); }
        
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="loader">
        <div class="font-serif text-4xl font-bold tracking-[0.5em]">VORTEX</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div class="mt-4 text-[8px] tracking-[0.6em] opacity-30 uppercase">Initializing Archive</div>
    </div>

    <div class="canvas-texture"></div>

    <nav class="fixed top-0 w-full z-50 p-8 lg:px-16 flex justify-between items-center">
        <div class="font-serif font-bold tracking-[0.3em] text-sm uppercase">VORTEX</div>
        <button class="p-3 rounded-full border border-black/5 hover:bg-black hover:text-white transition-all">
            <i data-lucide="menu" size="16"></i>
        </button>
    </nav>

    <main class="pt-32 lg:pt-48 pb-32">
        <section class="px-8 lg:px-16 mb-24 max-w-[1800px] mx-auto">
            <h1 class="font-serif text-[18vw] leading-[0.8] tracking-tighter uppercase font-bold text-black mb-12">
                Vortex
            </h1>
            <div class="flex flex-col md:flex-row justify-between items-end gap-8">
                <p class="max-w-xs text-[10px] uppercase tracking-[0.25em] leading-loose opacity-40">
                    Curating the ephemeral beauty of the physical world into a structured digital chronicle.
                </p>
                <div class="text-[8px] font-bold tracking-[0.4em] opacity-20 uppercase">Archive Ready / 2026</div>
            </div>
        </section>

        <section class="px-8 lg:px-16 mb-16 sticky top-24 z-40">
            <div id="filter-bar" class="flex gap-4 overflow-x-auto no-scrollbar py-4">
                <button onclick="filterRecords('all')" class="filter-btn active" id="btn-all">All Objects</button>
            </div>
        </section>

        <section class="px-8 lg:px-16 max-w-[1800px] mx-auto">
            <div id="p-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 lg:gap-20">
                </div>
        </section>
    </main>

    <footer class="p-16 lg:p-24 bg-white border-t border-black/5 text-black">
        <div class="max-w-[1600px] mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
            <div>
                <h2 class="font-serif text-6xl font-bold mb-8">VORTEX</h2>
                <p class="text-xs opacity-40 max-w-sm leading-relaxed uppercase tracking-widest">
                    International archival project documenting the evolution of product design.
                </p>
            </div>
            <div class="flex flex-col items-end justify-end space-y-4">
                <a href="mailto:wayfair@vortexd.com" class="text-lg font-light border-b border-black/20 pb-2 hover:border-black transition-all">wayfair@vortexd.com</a>
                <span class="text-[8px] tracking-widest opacity-20 uppercase">© 2026 Vortex Digital Archive</span>
            </div>
        </div>
    </footer>

    <script>
        // API 配置
        const API_CONFIG = {
            TOKEN: "uskSHurHAYSbDQBvTya8V2X",
            SHEET: "dstws9yu81bqKu8cvc",
            VIEW: "viwf1vrvWHjzg"
        };

        let allRecords = [];

        // 初始化图标
        lucide.createIcons();

        // 自定义光标逻辑
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX - 8}px, ${e.clientY - 8}px)`;
        });

        // 模拟加载逻辑
        async function init() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${API_CONFIG.SHEET}/records?viewId=${API_CONFIG.VIEW}`, {
                    headers: { 'Authorization': `Bearer ${API_CONFIG.TOKEN}` }
                });
                const res = await response.json();
                
                if (res.success) {
                    allRecords = res.data.records;
                    renderFilters(allRecords);
                    renderGrid(allRecords);
                }
            } catch (err) {
                console.error("Fetch Error:", err);
            } finally {
                // 延迟关闭加载屏
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
                }, 1500);
            }
        }

        // 渲染分类按钮
        function renderFilters(records) {
            const cats = new Set();
            records.forEach(r => {
                const tag = r.fields['分类'];
                if (Array.isArray(tag)) tag.forEach(t => cats.add(t));
                else if (tag) cats.add(tag);
            });

            const bar = document.getElementById('filter-bar');
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = cat;
                btn.onclick = () => filterRecords(cat);
                btn.setAttribute('data-cat', cat);
                bar.appendChild(btn);
            });
        }

        // 渲染网格
        function renderGrid(data) {
            const grid = document.getElementById('p-grid');
            grid.innerHTML = data.map((item, i) => {
                const f = item.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];
                if (!img) return "";
                
                return `
                    <div class="product-card group" onclick="window.open('${f['链接'] || '#'}')">
                        <div class="img-container mb-6">
                            <img src="${img}" alt="Object">
                        </div>
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] mb-1">${f['标题'] || 'Archive Object'}</h3>
                                <p class="text-[8px] opacity-30 uppercase tracking-widest">${Array.isArray(f['分类']) ? f['分类'].join(' / ') : f['分类']}</p>
                            </div>
                            <span class="text-[9px] font-serif italic opacity-20">#${String(i + 1).padStart(3, '0')}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 过滤逻辑
        function filterRecords(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnCat = btn.getAttribute('data-cat') || 'all';
                btn.classList.toggle('active', btnCat === cat);
            });

            const filtered = cat === 'all' ? allRecords : allRecords.filter(r => {
                const tags = r.fields['分类'];
                return Array.isArray(tags) ? tags.includes(cat) : tags === cat;
            });
            renderGrid(filtered);
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
