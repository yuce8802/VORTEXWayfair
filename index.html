<main class="pt-24 lg:pt-40 pb-20">
    <section class="px-6 lg:px-16 mb-12">
        <div class="hero-video-box" id="hero-video-container">
            <video id="hero-video" autoplay muted loop playsinline></video>
        </div>
    </section>

    <section class="px-6 lg:px-16 mb-10" id="filter-bar">
        <button onclick="filterRecords('all')" class="filter-btn active" id="btn-all">All Objects</button>
    </section>

    <div id="p-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 lg:gap-16 px-6 lg:px-16 max-w-[1600px] mx-auto"></div>
</main>

<footer class="bg-white border-t border-black/[0.05] pt-20 pb-10 px-6 lg:px-16 text-black">
    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="space-y-4">
                <h4 class="text-[10px] font-bold uppercase tracking-[0.2em]">Contact</h4>
                <p class="text-[10px] text-gray-500 uppercase tracking-wider">SHENZHEN RUHANG INTERNATIONAL</p>
            </div>
            <div class="space-y-4">
                <h4 class="text-[10px] font-bold uppercase tracking-[0.2em]">Legal</h4>
                <ul class="flex flex-wrap gap-4 text-[10px] text-gray-400 uppercase tracking-tighter">
                    <li><a href="#privacy" class="hover:text-black">Privacy</a></li>
                    <li><a href="#terms" class="hover:text-black">Terms</a></li>
                    <li><a href="#refund" class="hover:text-black">Returns</a></li>
                </ul>
            </div>
            <div class="md:text-right">
                <a href="mailto:wayfair@vortexd.com" class="text-lg font-light border-b border-black pb-1">wayfair@vortexd.com</a>
            </div>
        </div>
        
        <div id="privacy" class="legal-content-box">
            <p>VORTEX respects the digital footprint of every visitor...</p>
        </div>

        <p class="mt-20 text-center text-[7px] tracking-[0.4em] text-gray-300 uppercase">© VORTEX 2026</p>
    </div>
</footer>

<script>
    const API_CONFIG = {
        TOKEN: "uskSHurHAYSbDQBvTya8V2X",
        SHEET: "dstws9yu81bqKu8cvc"
    };
    let allRecords = []; 

    async function init() {
        try {
            const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${API_CONFIG.SHEET}/records?viewId=viwf1vrvWHjzg`, {
                headers: { 'Authorization': `Bearer ${API_CONFIG.TOKEN}` }
            });
            const res = await response.json();
            if (res.success) {
                allRecords = res.data.records;
                
                const firstRecord = allRecords[0].fields;
                let topVideoUrl = firstRecord['视频'] || (Array.isArray(firstRecord['图片']) ? firstRecord['图片'][0].url : firstRecord['图片']);
                
                const videoElement = document.getElementById('hero-video');
                if (topVideoUrl) {
                    videoElement.src = topVideoUrl;
                    videoElement.oncanplay = () => {
                        document.getElementById('hero-video-container').classList.add('video-ready');
                    };
                }

                generateFilterButtons(allRecords);
                renderGrid(allRecords); 
            }
        } catch (err) { console.error("Error:", err); }
        finally {
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }
    }

    function generateFilterButtons(records) {
        const categories = new Set();
        records.forEach(r => {
            const tags = r.fields['分类'];
            if (Array.isArray(tags)) tags.forEach(tag => categories.add(tag));
            else if (tags) categories.add(tags);
        });
        const bar = document.getElementById('filter-bar');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.innerText = cat;
            btn.onclick = () => filterRecords(cat);
            btn.setAttribute('data-cat', cat);
            bar.appendChild(btn);
        });
    }

    function renderGrid(data) {
        const grid = document.getElementById('p-grid');
        grid.innerHTML = data.map((item, i) => {
            const f = item.fields;
            let imgUrl = f['图片'] ? (Array.isArray(f['图片']) ? f['图片'][0].url : f['图片']) : "";
            if (!imgUrl) return "";
            return `
                <div class="product-card opacity-0 translate-y-6 transition-all duration-700" style="transition-delay: ${i*50}ms" id="card-${i}">
                    <div class="img-wrapper" onclick="window.open('${f['链接'] || '#'}')">
                        <img src="${imgUrl}" onload="document.getElementById('card-${i}').classList.remove('opacity-0', 'translate-y-6')">
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterRecords(selectedCat) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', (btn.getAttribute('data-cat') || 'all') === selectedCat);
        });
        const filtered = selectedCat === 'all' ? allRecords : allRecords.filter(item => {
            const tags = item.fields['分类'];
            return Array.isArray(tags) ? tags.includes(selectedCat) : tags === selectedCat;
        });
        renderGrid(filtered);
    }

    window.onload = init;
</script>
<div id="loading" class="fixed inset-0 bg-white z-[1001] flex items-center justify-center text-[10px] tracking-[0.5em] transition-opacity duration-500">VORTEX</div>
