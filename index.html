<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #ffffff;
            --text-main: #111111; 
            --glow-blue: rgba(0, 122, 255, 0.12); 
        }

        html { overflow-y: scroll; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-main); -webkit-font-smoothing: antialiased; }

        /* 呼吸灯动画 */
        @keyframes breathing {
            0% { box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.05); }
            50% { box-shadow: 0 10px 40px var(--glow-blue); border-color: rgba(0, 122, 255, 0.1); }
            100% { box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.05); }
        }

        /* 顶部展示区自适应高度 */
        .hero-video-box {
            width: 100%;
            aspect-ratio: 16 / 9; /* 手机端常用的 16:9 */
            background: #000;
            margin-bottom: 2rem;
            overflow: hidden;
            position: relative;
        }
        @media (min-width: 1024px) {
            .hero-video-box { aspect-ratio: 16 / 7; margin-bottom: 4rem; }
        }

        .hero-video-box video {
            width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease;
        }
        .video-ready video { opacity: 1; }

        /* 商品展示自适应 */
        .img-wrapper { 
            position: relative; 
            aspect-ratio: 1/1; 
            background: #fff;
            border: 1px solid rgba(0,0,0,0.05);
            animation: breathing 5s ease-in-out infinite;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: contain; padding: 12%; }

        .product-card:hover .img-wrapper {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 122, 255, 0.15);
        }

        /* 按钮排版优化：允许横向滚动防止换行折行 */
        #filter-bar {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 12px;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        #filter-bar::-webkit-scrollbar { display: none; }

        .filter-btn { 
            font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
            padding: 8px 18px; border: 1px solid #eee; color: #999; flex-shrink: 0;
        }
        .filter-btn.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }

        .legal-content-box { 
            display: none; padding: 2rem; background: #fafafa; border-left: 2px solid #111;
            margin-top: 1.5rem; font-size: 11px; color: #444; line-height: 1.8;
        }
        .legal-content-box:target { display: block; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 p-6 lg:px-16 flex justify-between items-center bg-white/80 backdrop-blur-lg">
        <div class="font-bold tracking-[0.3em] text-[10px] lg:text-xs uppercase">VORTEX</div>
    </nav>

    <main class="pt-24 lg:pt-40 pb-20">
        <section class="px-6 lg:px-16 mb-12">
            <div class="hero-video-box" id="hero-video-container">
                <video id="hero-video" autoplay muted loop playsinline></video>
            </div>
        </section>

        <section class="px-6 lg:px-16 mb-10" id="filter-bar">
            <button onclick="filterRecords('all')" class="filter-btn active" id="btn-all">All Objects</button>
        </section>

        <div id="p-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 lg:gap-16 px-6 lg:px-16 max-w-[1600px] mx-auto"></div>
    </main>

    <footer class="bg-white border-t border-black/[0.05] pt-20 pb-10 px-6 lg:px-16 text-black">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <div class="space-y-4">
                    <h4 class="text-[10px] font-bold uppercase tracking-[0.2em]">Contact</h4>
                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">SHENZHEN RUHANG INTERNATIONAL</p>
                </div>
                <div class="space-y-4">
                    <h4 class="text-[10px] font-bold uppercase tracking-[0.2em]">Legal</h4>
                    <ul class="flex flex-wrap gap-4 text-[10px] text-gray-400 uppercase tracking-tighter">
                        <li><a href="#privacy" class="hover:text-black">Privacy</a></li>
                        <li><a href="#terms" class="hover:text-black">Terms</a></li>
                        <li><a href="#refund" class="hover:text-black">Returns</a></li>
                    </ul>
                </div>
                <div class="md:text-right">
                    <a href="mailto:wayfair@vortexd.com" class="text-lg font-light border-b border-black pb-1">wayfair@vortexd.com</a>
                </div>
            </div>
            
            <div id="privacy" class="legal-content-box">
                <p>VORTEX respects the digital footprint of every visitor...</p>
            </div>

            <p class="mt-20 text-center text-[7px] tracking-[0.4em] text-gray-300 uppercase">© VORTEX 2026</p>
        </div>
    </footer>

    <script>
        const API_CONFIG = {
            TOKEN: "uskSHurHAYSbDQBvTya8V2X",
            SHEET: "dstws9yu81bqKu8cvc"
        };
        let allRecords = []; 

        async function init() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${API_CONFIG.SHEET}/records?viewId=viwf1vrvWHjzg`, {
                    headers: { 'Authorization': `Bearer ${API_CONFIG.TOKEN}` }
                });
                const res = await response.json();
                if (res.success) {
                    allRecords = res.data.records;
                    
                    const firstRecord = allRecords[0].fields;
                    let topVideoUrl = firstRecord['视频'] || (Array.isArray(firstRecord['图片']) ? firstRecord['图片'][0].url : firstRecord['图片']);
                    
                    const videoElement = document.getElementById('hero-video');
                    if (topVideoUrl) {
                        videoElement.src = topVideoUrl;
                        videoElement.oncanplay = () => {
                            document.getElementById('hero-video-container').classList.add('video-ready');
                        };
                    }

                    generateFilterButtons(allRecords);
                    renderGrid(allRecords); 
                }
            } catch (err) { console.error("Error:", err); }
            finally {
                const loader = document.getElementById('loading');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        }

        function generateFilterButtons(records) {
            const categories = new Set();
            records.forEach(r => {
                const tags = r.fields['分类'];
                if (Array.isArray(tags)) tags.forEach(tag => categories.add(tag));
                else if (tags) categories.add(tags);
            });
            const bar = document.getElementById('filter-bar');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = cat;
                btn.onclick = () => filterRecords(cat);
                btn.setAttribute('data-cat', cat);
                bar.appendChild(btn);
            });
        }

        function renderGrid(data) {
            const grid = document.getElementById('p-grid');
            grid.innerHTML = data.map((item, i) => {
                const f = item.fields;
                let imgUrl = f['图片'] ? (Array.isArray(f['图片']) ? f['图片'][0].url : f['图片']) : "";
                if (!imgUrl) return "";
                return `
                    <div class="product-card opacity-0 translate-y-6 transition-all duration-700" style="transition-delay: ${i*50}ms" id="card-${i}">
                        <div class="img-wrapper" onclick="window.open('${f['链接'] || '#'}')">
                            <img src="${imgUrl}" onload="document.getElementById('card-${i}').classList.remove('opacity-0', 'translate-y-6')">
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterRecords(selectedCat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', (btn.getAttribute('data-cat') || 'all') === selectedCat);
            });
            const filtered = selectedCat === 'all' ? allRecords : allRecords.filter(item => {
                const tags = item.fields['分类'];
                return Array.isArray(tags) ? tags.includes(selectedCat) : tags === selectedCat;
            });
            renderGrid(filtered);
        }

        window.onload = init;
    </script>
    <div id="loading" class="fixed inset-0 bg-white z-[1001] flex items-center justify-center text-[10px] tracking-[0.5em] transition-opacity duration-500">VORTEX</div>
</body>
</html>
